<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Estoque</title>
</head>
<body>

<h2>Cadastrar Produto</h2>

<form id="formProduto">
  <input name="nome" placeholder="Nome" required>
  <input name="codigo" placeholder="Código">
  <input name="estoque" type="number" placeholder="Estoque">
  <button>Salvar</button>
</form>

<h2>Movimentação</h2>

<form id="formMov">
  <select name="tipo">
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select>
  <input name="codigo" placeholder="Código">
  <input name="quantidade" type="number" value="1">
  <button>Enviar</button>
</form>

<h2>Produtos</h2>
<ul id="lista"></ul>

<script src="app.js"></script>
</body>
</html>
