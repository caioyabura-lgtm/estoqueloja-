<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque Atelie</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Estoque Atelie</h1>
      <p>Cadastro simples de produtos e movimentacao com foco em uso rapido no celular.</p>
    </header>

    <section class="card">
      <h2>Cadastrar produto</h2>
      <form id="formProduto" class="stack-form">
        <label class="field">
          <span>Nome do produto</span>
          <input name="nome" placeholder="Ex.: Blusa canelada M" required>
        </label>

        <label class="field">
          <span>Codigo</span>
          <input name="codigo" placeholder="Codigo de barras ou codigo interno">
        </label>

        <label class="field">
          <span>Estoque inicial</span>
          <input name="estoque" type="number" inputmode="numeric" placeholder="0">
        </label>

        <button type="submit">Salvar produto</button>
      </form>
    </section>

    <section class="card">
      <h2>Movimentacao</h2>
      <form id="formMov" class="stack-form">
        <label class="field">
          <span>Tipo de movimentacao</span>
          <select name="tipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saida</option>
          </select>
        </label>

        <label class="field">
          <span>Codigo do produto</span>
          <input name="codigo" placeholder="Digite ou leia o codigo">
        </label>

        <label class="field">
          <span>Quantidade</span>
          <input name="quantidade" type="number" inputmode="numeric" value="1">
        </label>

        <button type="submit">Registrar movimentacao</button>
      </form>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Produtos</h2>
        <button type="button" class="secondary-btn" onclick="getProducts()">Atualizar lista</button>
      </div>
      <ul id="lista" class="product-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
